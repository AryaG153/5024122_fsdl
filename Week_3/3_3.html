<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Bootstrap Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container py-4">
      <h2>Forms</h2>
      <form>
        <div class="mb-3">
          <label for="inputEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="inputEmail" placeholder="name@example.com" required>
          <div class="invalid-feedback">Please provide a valid email.</div>
        </div>

        <div class="mb-3">
          <label for="selectRole" class="form-label">Role</label>
          <select class="form-select" id="selectRole">
            <option selected>Choose...</option>
            <option value="1">Admin</option>
            <option value="2">Editor</option>
            <option value="3">Viewer</option>
          </select>
        </div>

        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="checkTerms">
            <label class="form-check-label" for="checkTerms">Accept terms</label>
          </div>
        </div>

        <div class="mb-3">
          <label for="rangeCtrl" class="form-label">Volume</label>
          <input type="range" class="form-range" id="rangeCtrl" min="0" max="100">
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </body>
</html>

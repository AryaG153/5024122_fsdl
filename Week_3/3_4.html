<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Bootstrap Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container py-4">
      <h2>Buttons</h2>
      <button type="button" class="btn btn-primary me-2">Primary</button>
      <button type="button" class="btn btn-secondary me-2">Secondary</button>
      <button type="button" class="btn btn-success me-2">Success</button>
      <button type="button" class="btn btn-outline-danger">Outline Danger</button>
      <button disabled class="btn btn-warning mt-2">Disabled</button>

      <div class="mt-3">
        <button class="btn btn-sm btn-info">Small</button>
        <button class="btn btn-lg btn-info">Large</button>
      </div>
    </div>
  </body>
</html>
